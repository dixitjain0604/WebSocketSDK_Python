{% extends "master.html" %}
{% block title %}{{ action }} Employee{% endblock %}
{% block content %}
<h2>{{ action }} Employee</h2>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Employee ID *</label>
            <input type="number" name="employee_id" class="form-control"
                   value="{{ emp.employee_id|default:'' }}" {% if action == 'Edit' %}readonly{% endif %} required>
        </div>
        <div class="col-md-8 mb-3">
            <label class="form-label">Name *</label>
            <input type="text" name="name" class="form-control" value="{{ emp.name|default:'' }}" required>
        </div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label">Department</label>
            <input type="number" name="department" class="form-control" value="{{ emp.department|default:0 }}">
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Privilege</label>
            <select name="privilege" class="form-select">
                <option value="0" {% if emp.privilege == 0 %}selected{% endif %}>User</option>
                <option value="1" {% if emp.privilege == 1 %}selected{% endif %}>Manager</option>
                <option value="2" {% if emp.privilege == 2 %}selected{% endif %}>Administrator</option>
            </select>
        </div>
        <div class="col-md-4 mb-3 d-flex align-items-end">
            <div class="form-check">
                <input type="checkbox" name="enabled" class="form-check-input" id="enabled"
                       {% if emp.enabled|default:True %}checked{% endif %}>
                <label class="form-check-label" for="enabled">Enabled</label>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Card Number</label>
            <input type="text" name="card" class="form-control" value="{{ emp.card|default:'' }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Password</label>
            <input type="text" name="password" class="form-control" value="{{ emp.password|default:'' }}">
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Period Start (date-time block start)</label>
            <input type="date" name="period_start" class="form-control" value="{{ emp.period_start|default:'' }}">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Period End (date-time block end)</label>
            <input type="date" name="period_end" class="form-control" value="{{ emp.period_end|default:'' }}">
        </div>
    </div>
    <h5>Access Timesets (timezone slot numbers, -1 = not set)</h5>
    <div class="row">
        {% for i in "12345" %}
        <div class="col mb-3">
            <label class="form-label">Timeset {{ i }}</label>
            <input type="number" name="timeset_{{ i }}" class="form-control"
                   value="{{ emp|getattr:'timeset_'|add:i|default:-1 }}">
        </div>
        {% endfor %}
    </div>
    <!-- Fallback for timeset values that don't render with the loop trick -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        var vals = [{{ emp.timeset_1|default:-1 }}, {{ emp.timeset_2|default:-1 }},
                    {{ emp.timeset_3|default:-1 }}, {{ emp.timeset_4|default:-1 }},
                    {{ emp.timeset_5|default:-1 }}];
        document.querySelectorAll('[name^="timeset_"]').forEach(function(el, i) {
            el.value = vals[i];
        });
    });
    </script>
    <button type="submit" class="btn btn-primary">Save &amp; Push to Devices</button>
    <a href="{% url 'employee_list' %}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
