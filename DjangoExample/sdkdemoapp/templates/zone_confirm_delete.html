{% extends "master.html" %}
{% block title %}Delete Zone{% endblock %}
{% block content %}
<h2>Delete Zone: {{ zone.name }}</h2>
<div class="alert alert-warning">Are you sure? Devices in this zone will have their zone assignment cleared.</div>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'zone_list' %}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
