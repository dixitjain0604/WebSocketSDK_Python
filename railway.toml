[build]
builder = "nixpacks"
# collectstatic must run before gunicorn serves any request
buildCommand = "/opt/venv/bin/pip install -r requirements.txt && cd DjangoExample && DJANGO_SETTINGS_MODULE=demosite.settings.production PYTHONPATH=../packages /opt/venv/bin/python manage.py migrate --run-syncdb && DJANGO_SETTINGS_MODULE=demosite.settings.production PYTHONPATH=../packages /opt/venv/bin/python manage.py collectstatic --noinput"

[deploy]
startCommand = "python start_all.py"
restartPolicyType = "always"
healthcheckPath = "/"
healthcheckTimeout = 300
